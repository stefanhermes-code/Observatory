# Streamlit Cloud Configuration
# This file is optional and can be used to configure Streamlit settings

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
# CORS must be true when XSRF protection is on (otherwise Streamlit overrides and warns)
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false

